name: expenses-management_deployment

"on":
  push:
    branches:
      - stage

jobs:
  darkube_build_expenses-management_shahinabbasi-expenses-managment_hamravesh-c13:
    container:
      image: hamravesh/darkube-cli:v1.1
      options: --user root
    env:
      IMAGE_NAME: registry.hamdocker.ir/shahinabbasi/expenses-management
    runs-on: ubuntu-latest
    steps:
      - name: checkout commit
        uses: actions/checkout@v4
      - name: darkube-cli build & push
        run:
          "darkube build --push -t $IMAGE_NAME:${GITHUB_SHA:0:7} -t $IMAGE_NAME:${GITHUB_REF_NAME}
          --docker-auth-config ${{secrets.DOCKER_AUTH_CONFIG}} --workdir . --file ./Dockerfile.stage
          --build-context . "
  darkube_deploy_expenses-management_shahinabbasi-expenses-managment_hamravesh-c13:
    container: hamravesh/darkube-cli:v1.1
    needs: darkube_build_expenses-management_shahinabbasi-expenses-managment_hamravesh-c13
    runs-on: ubuntu-latest
    steps:
      - name: darkube-cli deploy
        run:
          darkube deploy --token ${{secrets.DEPLOY_TOKEN_EXPENSES_MANAGEMENT_SHAHINABBASI_EXPENSES_MANAGMENT_HAMRAVESH_C13}}
          --app-id ${{secrets.APP_ID_EXPENSES_MANAGEMENT_SHAHINABBASI_EXPENSES_MANAGMENT_HAMRAVESH_C13}}
          --image-tag ${GITHUB_SHA:0:7} --job-id ${GITHUB_RUN_ID}
